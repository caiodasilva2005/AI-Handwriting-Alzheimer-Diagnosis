<!DOCTYPE html>
<html>

<head>

    <title>AI Handwriting Alzheimer Detection</title>

    <style>

        body {
            font-family: Arial;
            max-width: 900px;
            margin: 40px auto;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
        }

        img {
            max-width: 500px;
        }

    </style>

</head>

<body>

<h1>AI Handwriting Alzheimer Detection</h1>

<div class="card">

<form
    action="/predict"
    method="POST"
    enctype="multipart/form-data"
>

    <h3>Handwriting Image</h3>

    <input
        type="file"
        name="image"
        accept="image/*"
    >

    <h3>Kinematic CSV</h3>

    <input
        type="file"
        name="csv"
        accept=".csv"
    >

    <br>

    <button type="submit">
        Run Prediction
    </button>

</form>

</div>

{% if result %}

<hr>

<h2>Results</h2>

<p>
    <strong>Model:</strong>
    {{ result.model_used }}
</p>

<p>
    <strong>Prediction:</strong>
    {{ result.prediction }}
</p>

<p>
    <strong>Confidence:</strong>
    {{ "%.2f"|format(result.confidence * 100) }}%
</p>

{% if result.gradcam %}

<h3>GradCAM</h3>

<img src="{{ result.gradcam }}">

{% endif %}

{% endif %}

</body>
</html>
